apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fastapi-service-netpol
  namespace: deploy-services
spec:
  podSelector:
    matchLabels:
      app: fastapi-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 8000
          protocol: TCP
