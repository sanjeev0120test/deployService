apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fastify-service-hpa
  namespace: deploy-services
  labels:
    app: fastify-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fastify-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
