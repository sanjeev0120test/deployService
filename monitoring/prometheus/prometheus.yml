global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "fastify-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["fastify-service:3001"]

  - job_name: "nextjs-service"
    metrics_path: /api/metrics
    static_configs:
      - targets: ["nextjs-service:3002"]

  - job_name: "fastapi-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["fastapi-service:8000"]

  - job_name: "otel-collector"
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:8889"]
